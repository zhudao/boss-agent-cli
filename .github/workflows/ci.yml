name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=boss_agent_cli --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          # 公开仓库支持 tokenless 上传，token 配置后可获得完整功能
          # 若 secret 缺失，action 会降级为 tokenless，不阻塞 CI

      - name: Verify CLI loads
        run: uv run python -c "from boss_agent_cli.main import cli; print('CLI loaded')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Compile check all modules
        run: uv run python -m compileall src/boss_agent_cli/ -q

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Check critical imports
        run: |
          uv run python -c "
          from boss_agent_cli.auth.manager import AuthManager
          from boss_agent_cli.api.client import BossClient
          from boss_agent_cli.cache.store import CacheStore
          from boss_agent_cli.commands.schema import schema_cmd
          print('All critical imports OK')
          "

  typecheck:
    runs-on: ubuntu-latest
    # 静态类型检查：baseline 已清零，切为 blocking
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/boss_agent_cli
